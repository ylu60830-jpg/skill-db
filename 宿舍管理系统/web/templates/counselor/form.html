{% extends "base.html" %}
{% block title %}{{ '编辑辅导员' if counselor else '添加辅导员' }} - 宿舍信息管理系统{% endblock %}
{% block content %}

<div class="page-header">
    <h1>{{ '编辑辅导员' if counselor else '添加辅导员' }}</h1>
    <a href="{{ url_for('counselor_list') }}" class="btn btn-warning">返回列表</a>
</div>

<div class="panel">
    <div class="panel-body">
        <form method="post" data-validate>
            <div class="form-group">
                <label for="counselor_name">姓名 <span style="color:red">*</span></label>
                <div class="form-control">
                    <input type="text" id="counselor_name" name="counselor_name" required
                           value="{{ counselor.counselor_name if counselor else '' }}"
                           maxlength="30" placeholder="请输入姓名">
                </div>
            </div>
            <div class="form-group radio-group">
                <label>性别 <span style="color:red">*</span></label>
                <div class="radio-options">
                    <label class="radio-label">
                        <input type="radio" name="gender" value="男" required
                               {% if not counselor or counselor.gender == '男' %}checked{% endif %}> 男
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="gender" value="女"
                               {% if counselor and counselor.gender == '女' %}checked{% endif %}> 女
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label for="phone">电话</label>
                <div class="form-control">
                    <input type="text" id="phone" name="phone"
                           value="{{ counselor.phone if counselor else '' }}"
                           maxlength="15" placeholder="如 13800138000">
                </div>
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <div class="form-control">
                    <input type="email" id="email" name="email"
                           value="{{ counselor.email if counselor else '' }}"
                           maxlength="50" placeholder="如 counselor@school.edu.cn">
                </div>
            </div>
            <div class="form-group">
                <label for="office">办公室</label>
                <div class="form-control">
                    <input type="text" id="office" name="office"
                           value="{{ counselor.office if counselor else '' }}"
                           maxlength="50" placeholder="如 行政楼301">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">
                    {{ '保存修改' if counselor else '确认添加' }}
                </button>
                <a href="{{ url_for('counselor_list') }}" class="btn btn-warning">取消</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
