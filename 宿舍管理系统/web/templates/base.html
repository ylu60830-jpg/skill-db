<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}宿舍信息管理系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- ═══════════════ 顶部导航 ═══════════════ -->
<nav class="topnav">
    <span class="brand">宿舍管理系统</span>
    <a href="{{ url_for('index') }}"       class="{% if request.path == '/' %}active{% endif %}">首页</a>
    <a href="{{ url_for('student_list') }}" class="{% if request.path.startswith('/student') %}active{% endif %}">学生管理</a>
    <a href="{{ url_for('dorm_list') }}"     class="{% if request.path.startswith('/dormitory') %}active{% endif %}">宿舍管理</a>
    <a href="{{ url_for('class_list') }}"    class="{% if request.path.startswith('/class') %}active{% endif %}">班级管理</a>
    <a href="{{ url_for('counselor_list') }}" class="{% if request.path.startswith('/counselor') %}active{% endif %}">辅导员管理</a>
</nav>

<!-- ═══════════════ 消息提示 ═══════════════ -->
<div class="flash-container">
{% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
    <div class="flash {{ category }}">{{ msg }}</div>
    {% endfor %}
{% endwith %}
</div>

<!-- ═══════════════ 主内容区 ═══════════════ -->
<main class="container">
    {% block content %}{% endblock %}
</main>

<!-- ═══════════════ 页脚 ═══════════════ -->
<footer>
    宿舍信息管理系统 v2.0 Web &copy; 2026 &nbsp;|&nbsp; 数据库: MySQL 8.4
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
