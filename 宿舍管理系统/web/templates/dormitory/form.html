{% extends "base.html" %}
{% block title %}{{ '编辑宿舍' if dorm else '添加宿舍' }} - 宿舍信息管理系统{% endblock %}
{% block content %}

<div class="page-header">
    <h1>{{ '编辑宿舍' if dorm else '添加宿舍' }}</h1>
    <a href="{{ url_for('dorm_list') }}" class="btn btn-warning">返回列表</a>
</div>

<div class="panel">
    <div class="panel-body">
        <form method="post" data-validate>
            <div class="form-group">
                <label for="building_name">楼栋 <span style="color:red">*</span></label>
                <div class="form-control">
                    <input type="text" id="building_name" name="building_name" required
                           value="{{ dorm.building_name if dorm else '' }}"
                           maxlength="30" placeholder="如 A栋">
                </div>
            </div>
            <div class="form-group">
                <label for="dorm_no">宿舍号 <span style="color:red">*</span></label>
                <div class="form-control">
                    <input type="text" id="dorm_no" name="dorm_no" required
                           value="{{ dorm.dorm_no if dorm else '' }}"
                           maxlength="10" placeholder="如 101">
                </div>
            </div>
            <div class="form-group">
                <label for="floor">楼层 <span style="color:red">*</span></label>
                <div class="form-control">
                    <input type="number" id="floor" name="floor" required
                           value="{{ dorm.floor if dorm else '' }}"
                           min="1" max="30" placeholder="如 1">
                </div>
            </div>
            <div class="form-group">
                <label for="bed_count">床位数 <span style="color:red">*</span></label>
                <div class="form-control">
                    <input type="number" id="bed_count" name="bed_count" required
                           value="{{ dorm.bed_count if dorm else '4' }}"
                           min="1" max="12" placeholder="默认 4">
                </div>
            </div>
            <div class="form-group radio-group">
                <label>类型 <span style="color:red">*</span></label>
                <div class="radio-options">
                    <label class="radio-label">
                        <input type="radio" name="dorm_type" value="男" required
                               {% if not dorm or dorm.dorm_type == '男' %}checked{% endif %}> 男寝
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="dorm_type" value="女"
                               {% if dorm and dorm.dorm_type == '女' %}checked{% endif %}> 女寝
                    </label>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">
                    {{ '保存修改' if dorm else '确认添加' }}
                </button>
                <a href="{{ url_for('dorm_list') }}" class="btn btn-warning">取消</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
