{% extends "base.html" %}
{% block title %}{{ '编辑班级' if cls else '添加班级' }} - 宿舍信息管理系统{% endblock %}
{% block content %}

<div class="page-header">
    <h1>{{ '编辑班级' if cls else '添加班级' }}</h1>
    <a href="{{ url_for('class_list') }}" class="btn btn-warning">返回列表</a>
</div>

<div class="panel">
    <div class="panel-body">
        <form method="post" data-validate>
            <div class="form-group">
                <label for="class_name">班级名称 <span style="color:red">*</span></label>
                <div class="form-control">
                    <input type="text" id="class_name" name="class_name" required
                           value="{{ cls.class_name if cls else '' }}"
                           maxlength="50" placeholder="如 计算机科学与技术1班">
                </div>
            </div>
            <div class="form-group">
                <label for="department">所属院系 <span style="color:red">*</span></label>
                <div class="form-control">
                    <input type="text" id="department" name="department" required
                           value="{{ cls.department if cls else '' }}"
                           maxlength="50" placeholder="如 计算机学院">
                </div>
            </div>
            <div class="form-group">
                <label for="grade">年级</label>
                <div class="form-control">
                    <input type="text" id="grade" name="grade"
                           value="{{ cls.grade if cls else '' }}"
                           maxlength="4" placeholder="如 2024">
                </div>
            </div>
            <div class="form-group">
                <label for="counselor_id">辅导员 <span style="color:red">*</span></label>
                <div class="form-control">
                    <select id="counselor_id" name="counselor_id" required>
                        <option value="">-- 请选择辅导员 --</option>
                        {% for co in counselors %}
                        <option value="{{ co.counselor_id }}"
                                {% if cls and cls.counselor_id == co.counselor_id %}selected{% endif %}>
                            {{ co.counselor_name }} (ID: {{ co.counselor_id }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">
                    {{ '保存修改' if cls else '确认添加' }}
                </button>
                <a href="{{ url_for('class_list') }}" class="btn btn-warning">取消</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
